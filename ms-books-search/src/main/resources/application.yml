server:
  port: 8083

spring:
  application:
    name: ms-books-search
  elasticsearch:
    uris: ${ELASTICSEARCH_URI:http://localhost:9200}

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_CLIENT_SERVICEURL_DEFAULTZONE:http://localhost:8761/eureka/}
  instance:
    prefer-ip-address: true

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html

management:
  endpoints:
    web:
      exposure:
        include: health,info

catalogue:
  service:
    name: ms-books-catalogue

logging:
  level:
    com.books.search: DEBUG
